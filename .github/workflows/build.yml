# このファイルはリポジトリの .github/workflows/build.yml に置いてください
name: yamabiko-build

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST (UTC 21:00)
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write           # docs/episodes へコミットするため

concurrency:
  group: yamabiko
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Cache whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-${{ env.WHISPER_MODEL || 'small' }}

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHISPER_MODEL: small
          LATEST_PER_FEED: "1"
        run: python pipeline/transcribe.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/episodes
          if git diff --cached --quiet; then
            echo "No new episodes."
          else
            git commit -m "Add transcripts $(date -u +%F)"
            git push
          fi
